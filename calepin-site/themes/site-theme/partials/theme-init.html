    <meta name="color-scheme" content="light">
    <!-- Light mode only. Pin data-theme=light so Pico (loaded from CDN, which
         otherwise auto-switches via @media prefers-color-scheme: dark) and any
         theme rules always resolve to the light palette. Runs before first
         paint, so there is no flash. No system/storage detection = no auto/dark. -->
    <script>document.documentElement.dataset.theme = "light";</script>
