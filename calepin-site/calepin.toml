# =============================================================================
# Calepin site configuration — a replica of benstanley.eu built with Calepin
# (https://github.com/vincentarelbundock/calepin) instead of Quarto.
#
# This file is completely self-contained. Nothing here touches or depends on the
# Quarto site in the parent directory. All paths below are relative to THIS
# directory (the one that contains calepin.toml).
# =============================================================================

title       = "Ben Stanley"
description  = "Associate Professor at the Centre for the Study of Democracy, SWPS University. Research on populism, illiberalism and authoritarianism in Central and Eastern Europe."
base_url     = "https://benstanley.eu"

# Local copy of the built-in `academic` theme (a reading-first theme with a top
# navigation bar, closest in spirit to the original Quarto navbar). It was
# ejected with `calepin new theme ... --theme academic` and then extended with a
# footer partial (themes/site-theme/partials/site-footer.html) wired into the
# webpage/landing layouts. Brand colours/fonts are layered on via assets/site.css.
theme  = "themes/site-theme"
styles = ["assets/site.css"]

# The original site ships HTML only (no per-page PDF twins). Keep it that way so
# the iframe-based pages and external embeds build cleanly.
pdf    = false
minify = true
search = "pagefind"

