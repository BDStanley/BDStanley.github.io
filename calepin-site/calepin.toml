target = "https://creativecommons.org/licenses/by/4.0/"
label  = "© 2025 Ben Stanley · CC BY 4.0"

[[menus.footer]]
target = "https://github.com/vincentarelbundock/calepin"
label  = "Made with Typst and Calepin"

# -----------------------------------------------------------------------------
# Static files copied verbatim into the build output (not rendered as pages).
# -----------------------------------------------------------------------------
[static]
include = [
  "assets/**",
  "cv/cv.pdf",   # the CV PDF, built from cv/cv.yml by build.sh (see README)
]

# Keep theme internals and the CV Typst sources from being built as site pages.
# (cv/cv.yml is still read by the publications/research-projects pages via yaml().)
[pages]
exclude = ["themes/**", "cv/**", "_site/**"]
