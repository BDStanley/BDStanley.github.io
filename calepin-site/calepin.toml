# -----------------------------------------------------------------------------
# Footer. NOTE: the built-in `academic` theme does not render a footer region,
# so these entries are currently inert — kept here so the licence/credit line
# appears automatically if you switch to a theme that supports a `footer` menu
# (e.g. a local/ejected theme). See README.md.
# -----------------------------------------------------------------------------
